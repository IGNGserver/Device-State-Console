name: device-state-console

services:
  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    command: ["mysqld", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 15

  server:
    image: device-state-console-server:${DSC_VERSION:-dev}
    build:
      context: .
      dockerfile: deploy/docker/server.Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DSC_VERSION: ${DSC_VERSION:-dev}
      SERVER_PORT: 4000
      REDIS_URL: redis://redis:6379
      MYSQL_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy

  web:
    image: device-state-console-web:${DSC_VERSION:-dev}
    build:
      context: .
      dockerfile: deploy/docker/web.Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DSC_VERSION: ${DSC_VERSION:-dev}
      SERVER_API_URL: http://server:4000
    ports:
      - "${WEB_PORT:-3100}:3000"
    depends_on:
      - server

volumes:
  redis-data:
  mysql-data:
